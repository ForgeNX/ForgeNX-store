version: '3.7'

networks:
  forgenx_network:
    external: true
    name: forgenx_network
  umbrel_main_network:
    external: true
    name: umbrel_main_network

services:

  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    restart: on-failure
    environment:
      APP_HOST: forgebch-ui
      APP_PORT: 80
      DEVICE_DOMAIN_NAME: forgenx.local
      JWT_SECRET: ${JWT_SECRET}
      MANAGER_IP: ${HOST_IP}
      PROXY_AUTH_ADD: 'false'
      UMBREL_AUTH_SECRET: ${APP_PASSWORD}
    networks:
      - umbrel_main_network
    volumes:
      - /opt/forgenx/apps/forgebch/umbrel-app.yml:/extra/umbrel-app.yml:ro

  init-permissions:
    image: alpine:3.19
    restart: 'no'
    command: >
      sh -c "
        mkdir -p /data/node &&
        mkdir -p /data/logs &&
        mkdir -p /host-coins &&
        chown -R 1000:1000 /data
      "
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /var/lib/forgenx/shared/forgenx/coins:/host-coins

  ui:
    image: ghcr.io/forgenx/forgebch-ui:1.0.107
    container_name: forgebch-ui
    restart: unless-stopped
    networks:
      - umbrel_main_network
      - forgenx_network

  node:
    image: ghcr.io/forgenx/forgebch:1.0.11
    container_name: forgebch-node
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    environment:
      - BCH_RPC_USER=${BCH_RPC_USER:-forgebch}
      - BCH_RPC_PORT=${BCH_RPC_PORT:-9002}
      - BCH_RPC_PASS=${BCH_RPC_PASS}
      - BCH_PRUNE=${BCH_PRUNE:-0}
      - BCH_NETWORK=${BCH_NETWORK:-mainnet}
      - BCH_AUTO_START=${BCH_AUTO_START:-true}
      - BCH_PAYOUT_ADDRESS=${BCH_PAYOUT_ADDRESS:-}
      - BCH_WORKER_NAME=${BCH_WORKER_NAME:-}
      - BCH_DIFF_PRESET=${BCH_DIFF_PRESET:-home}
      - BCH_START_DIFF=${BCH_START_DIFF:-128}
      - BCH_MIN_DIFF=${BCH_MIN_DIFF:-32}
      - BCH_MAX_DIFF=${BCH_MAX_DIFF:-4096}
      - BCH_DONATION1_PCT=${BCH_DONATION1_PCT:-1.0}
      - BCH_DONATION2_ADDR=${BCH_DONATION2_ADDR:-}
      - BCH_DONATION2_PCT=${BCH_DONATION2_PCT:-0}
      - COIN_ID=bch
      - STRATUM_PORT=3334
      - P2P_PORT=8333
      - RPC_PORT=9002
      - ZMQ_PORT=28333
    ports:
      - "8333:8333"    # P2P
      - "9002:9002"    # RPC (internal use only)
      - "28333:28333"  # ZMQ
    volumes:
      - ${APP_DATA_DIR}/data/node:/data/.bitcoin
      - /var/lib/forgenx/shared/forgenx/coins:/pool/coins
      - ${APP_DATA_DIR}/data/logs:/data/logs
    networks:
      umbrel_main_network:
      forgenx_network:
        aliases:
          - forgebch-node
