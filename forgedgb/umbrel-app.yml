manifestVersion: 1
id: forgedgb
category: bitcoin
name: ForgeDGB
version: "0.1.22"
tagline: DigiByte full node + solo mining pool
description: >-
  ForgeDGB runs a DigiByte full node (DigiByteCore v9.26.4) and connects
  it to the ForgeNX Engine as a solo mining pool.

  Features:
    - DigiByteCore v9.26.4 full node with automatic sync
    - Connects automatically to ForgeNX Engine via Stratum V1 & V2
    - Stratum V1 (standard TCP)
    - Stratum V2 with standard and extended channels (Noise Protocol, ChaCha20-Poly1305 encryption)
    - Real-time node stats in the ForgeNX dashboard
    - Pruned mode support (saves disk space)
    - ZMQ block/transaction publishing for pool engine
    - Adjustable difficulty presets (Home, Small Farm, Large Farm)
    - Multi-algorithm support: SHA-256d, Scrypt, Skein, Qubit, Odocrypt

  Miner connection (via ForgeNX Engine):
    - Stratum V1 URL: stratum+tcp://<your-server-ip>:3333
    - Stratum V2 URL: stratum+tcp://<your-server-ip>:4333
    - Username: your payout address (or address.workername)
    - Password: anything
    - Stratum V2: add the authority public key from the Overview tab to your miner's pool settings

  Notes:
    - DigiByte uses 5 mining algorithms with DigiShield difficulty adjustment
    - DigiByte has 15-second target block times — one of the fastest UTXO chains
    - Full chain is large; SSD strongly recommended
    - First sync can take several hours depending on hardware
    - ForgeNX Engine must be installed and running before installing ForgeDGB

  Components:
    - DigiByteCore v9.26.4 — https://github.com/DigiByte-Core/digibyte/releases
    - ForgeNX Engine (Stratum pool) — https://github.com/ForgeNX/forgenx-engine

  Ports:
    - P2P: 12024
    - RPC: 9001 (internal)
    - ZMQ: 28332 (internal)
    - Stratum V1: 3333 (via ForgeNX Engine)
    - Stratum V2: 4333 (via ForgeNX Engine)

  Status:
    - v0.1.0: Coming soon. Node software integration in progress.
