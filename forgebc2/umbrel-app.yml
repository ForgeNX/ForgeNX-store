manifestVersion: 1
id: forgebc2
category: bitcoin
name: ForgeBC2
version: "0.1.0"
tagline: Bitcoin II full node + solo mining pool
description: >-
  ForgeBC2 runs a Bitcoin II full node (BitcoinII Core v29.10) and connects
  it to the ForgeNX Engine as a solo mining pool.

  Features:
    - BitcoinII Core v29.10 full node with automatic sync
    - Connects automatically to ForgeNX Engine via Stratum
    - Real-time node stats in the ForgeNX dashboard
    - Pruned mode support (saves disk space)
    - ZMQ block/transaction publishing for pool engine
    - Adjustable difficulty presets (Home, Small Farm, Large Farm)

  Miner connection (via ForgeNX Engine):
    - URL: stratum+tcp://<your-ip>:3338
    - Username: your BC2 payout address (or address.workername)
    - Password: anything

  Notes:
    - First sync can take several hours depending on hardware
    - SSD strongly recommended
    - ForgeNX Engine must be installed and running before installing ForgeBC2

  Components:
    - BitcoinII Core v29.10 — https://github.com/Bitcoin-II/BitcoinII-Core/releases
    - ForgeNX Engine (Stratum pool) — https://github.com/ForgeNX/forgenx-engine

  Ports:
    - P2P: 8341
    - RPC: 9006 (internal)
    - ZMQ: 28337 (internal)
    - Stratum: 3338 (via ForgeNX Engine)

  Status:
    - v0.1.0: Coming soon. Node software integration in progress.
developer: ForgeNX
website: https://github.com/ForgeNX
repo: https://github.com/ForgeNX
support: https://github.com/ForgeNX
